<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Login | A1SATANEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body data-page="customer-login">
    <header class="site-header glass">
        <a class="brand" href="/"><img class="brand-logo" src="{{ url_for('static', filename='a1datanest_logo.png') }}" alt="A1SATANEST Logo" /></a>
        <nav class="nav-links">
            <a class="nav-item" data-icon="⌂" href="/">Home</a>
            <a class="nav-item" data-icon="🛠" href="/booking">Book Repair</a>
            <a class="nav-item" data-icon="⌨" href="/products">Accessories</a>
            <a class="nav-item" data-icon="❓" href="/support">Support</a>
            <a class="nav-item" data-icon="✉" href="/contact">Contact</a>
            <a class="nav-item active" data-icon="👤" href="/customer/login">My Account</a>
        </nav>
        <button id="mobileMenuBtn" class="menu-btn">Menu</button>
    </header>

    <main class="wrap section" style="display:grid;place-items:center;min-height:72vh;">
        <section class="glass quick-card" style="width:min(520px,100%);">
            <h1>Customer OTP Login</h1>
            <p class="muted">Sign in using your phone number to track your repairs and orders.</p>

            <form id="customerOtpForm" class="form-grid">
                <input name="phone" id="customerPhone" placeholder="Phone Number" required />
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button type="button" id="sendOtpBtn" class="btn btn-ghost">Send OTP</button>
                    <input name="otp" id="customerOtp" placeholder="Enter 6-digit OTP" maxlength="6" required style="flex:1;min-width:180px;" />
                </div>
                <button class="btn btn-primary" type="submit">Verify & Login</button>
            </form>

            <p id="customerOtpMessage" class="message"></p>
            <p id="customerOtpHint" class="muted" style="margin-top:8px;"></p>
        </section>
    </main>
</body>
</html>
