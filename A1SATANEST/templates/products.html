<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessories Store | A1SATANEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body data-page="products">
    <header class="site-header glass">
        <a class="brand" href="/"><img class="brand-logo" src="{{ url_for('static', filename='a1datanest_logo.png') }}" alt="A1SATANEST Logo" /></a>
        <nav class="nav-links">
            <a class="nav-item" data-icon="⌂" href="/">Home</a>
            <a class="nav-item" data-icon="🛠" href="/booking">Book Repair</a>
            <a class="nav-item active" data-icon="⌨" href="/products">Accessories</a>
            <a class="nav-item" data-icon="❓" href="/support">Support</a>
            <a class="nav-item" data-icon="✉" href="/contact">Contact</a>
            <a class="nav-item" data-icon="👤" href="/customer/login">My Account</a>
            <a href="/admin">Admin</a>
        </nav>
        <button id="mobileMenuBtn" class="menu-btn">Menu</button>
    </header>

    <main class="wrap section">
        <div class="section-head">
            <h1>Laptop Parts & Accessories</h1>
            <p>Genuine, fully tested parts at startup-friendly pricing.</p>
        </div>

        <div class="toolbar glass">
            <input id="productSearch" type="search" placeholder="Search product name..." />
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Power">Power</option>
                <option value="Storage">Storage</option>
                <option value="Performance">Performance</option>
                <option value="Accessories">Accessories</option>
            </select>
            <button id="clearFilters" class="btn btn-ghost">Reset</button>
            <button id="openCartBtn" class="btn btn-primary">Cart (<span id="cartCount">0</span>)</button>
        </div>

        <div id="productGrid" class="product-grid"></div>
    </main>

    <aside id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button id="closeCartBtn" class="icon-btn">✕</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <p>Total: <strong>Rs <span id="cartTotal">0</span></strong></p>
            <button id="checkoutBtn" class="btn btn-primary full">Checkout</button>
        </div>
    </aside>

    <section id="checkoutModal" class="modal hidden">
        <div class="modal-card">
            <div class="modal-head">
                <h3>Place Order</h3>
                <button id="closeCheckout" class="icon-btn">✕</button>
            </div>
            <form id="checkoutForm" class="form-grid">
                <input name="customer_name" required placeholder="Full Name" />
                <input name="phone" required placeholder="Phone Number" />
                <input name="city" required placeholder="City" />
                <textarea name="address" required placeholder="Full delivery address"></textarea>
                <select name="payment_mode" required>
                    <option value="">Select Payment Mode</option>
                    <option>COD</option>
                    <option>UPI</option>
                    <option>Card</option>
                </select>
                <button class="btn btn-primary" type="submit">Confirm Order</button>
            </form>
            <p id="checkoutMessage" class="message"></p>
        </div>
    </section>
</body>
</html>
