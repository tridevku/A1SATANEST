<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | A1SATANEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <header class="site-header glass">
        <a class="brand" href="/"><img class="brand-logo" src="{{ url_for('static', filename='a1datanest_logo.png') }}" alt="A1SATANEST Logo" /></a>
        <nav class="nav-links">
            <a class="nav-item" data-icon="⌂" href="/">Home</a>
            <a class="nav-item" data-icon="🛠" href="/booking">Book Repair</a>
            <a class="nav-item" data-icon="⌨" href="/products">Accessories</a>
            <a class="nav-item" data-icon="❓" href="/support">Support</a>
            <a class="nav-item" data-icon="✉" href="/contact">Contact</a>
        </nav>
        <button class="menu-btn" disabled>Admin</button>
    </header>

    <main class="wrap section" style="display:grid;place-items:center;min-height:70vh;">
        <section class="glass quick-card" style="width:min(460px,100%);">
            <h1>Admin Access Locked</h1>
            <p class="muted">Enter admin password to view customer orders and service data.</p>
            <form method="post" action="/admin/login" class="form-grid">
                <input type="hidden" name="next" value="{{ next_url }}" />
                <input type="password" name="password" placeholder="Admin Password" required />
                <button class="btn btn-primary" type="submit">Unlock Admin Panel</button>
            </form>
            {% if error %}
            <p class="message" style="color:#b73030;">{{ error }}</p>
            {% endif %}
            <p class="muted" style="margin-top:10px;">Tip: set env var <code>A1_ADMIN_PASSWORD</code> to change the default password.</p>
        </section>
    </main>
</body>
</html>
