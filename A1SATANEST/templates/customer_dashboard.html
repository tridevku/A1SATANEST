<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard | A1SATANEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body data-page="customer-dashboard">
    <header class="site-header glass">
        <a class="brand" href="/"><img class="brand-logo" src="{{ url_for('static', filename='a1datanest_logo.png') }}" alt="A1SATANEST Logo" /></a>
        <nav class="nav-links">
            <a class="nav-item" data-icon="⌂" href="/">Home</a>
            <a class="nav-item" data-icon="🛠" href="/booking">Book Repair</a>
            <a class="nav-item" data-icon="⌨" href="/products">Accessories</a>
            <a class="nav-item" data-icon="❓" href="/support">Support</a>
            <a class="nav-item" data-icon="✉" href="/contact">Contact</a>
            <a class="nav-item active" data-icon="👤" href="/customer/dashboard">My Account</a>
            <a class="nav-item" data-icon="↩" href="/customer/logout">Logout</a>
        </nav>
        <button id="mobileMenuBtn" class="menu-btn">Menu</button>
    </header>

    <main class="wrap section">
        <div class="section-head">
            <h1>My Service & Order Dashboard</h1>
            <p id="customerPhoneLabel" class="muted"></p>
        </div>

        <section class="section">
            <h2>My Repair Tickets</h2>
            <div class="table-wrap glass">
                <table>
                    <thead>
                        <tr>
                            <th>Ticket</th>
                            <th>Laptop</th>
                            <th>Issue</th>
                            <th>Urgency</th>
                            <th>Estimate</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="customerServiceRows"></tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <h2>My Accessory Orders</h2>
            <div class="table-wrap glass">
                <table>
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>City</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="customerOrderRows"></tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
