services:
  - type: web
    name: a1satanest
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: A1_SECRET_KEY
        generateValue: true
      - key: A1_ADMIN_PASSWORD
        value: A1@SecureAdmin
